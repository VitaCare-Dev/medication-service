name: Trigger auto deployment for medication-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/medication-service-AutoDeployTrigger-d319a3c3-b8c6-4360-a12d-26e5a24be6ff.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MEDICATIONSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MEDICATIONSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MEDICATIONSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: vitacareacr.azurecr.io
          registryUsername: ${{ secrets.MEDICATIONSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MEDICATIONSERVICE_REGISTRY_PASSWORD }}
          containerAppName: medication-service
          resourceGroup: rg-vitacare
          imageToBuild: vitacareacr.azurecr.io/medication-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


